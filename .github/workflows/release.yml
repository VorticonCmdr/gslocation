name: Build & Release Extension

on:
  push:
    tags:
      - 'v*'   # Triggert bei jedem Tag wie v3.7, v3.8 etc.

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Version aus Tag auslesen
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: ZIP erstellen
        run: |
          zip -r gslocation.${{ steps.version.outputs.VERSION }}.zip . \
            -x "*/.DS_Store" \
            -x "*/.git/*" \
            -x "*/.gitignore" \
            -x "*/.handlebars" \
            -x "*.md" \
            -x ".github/*"

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: gslocation.${{ steps.version.outputs.VERSION }}.zip
          generate_release_notes: true  # Erstellt automatisch Changelog aus Commits
